<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px;
    background: #080808;
    font-family: 'Oswald', 'Arial Narrow', sans-serif;
    color: #e8e8e8;
    overflow: hidden;
    position: relative;
  }
  /* ambient glow */
  .glow {
    position: absolute; right: -180px; top: 50%; transform: translateY(-50%);
    width: 900px; height: 900px; border-radius: 50%;
    background: radial-gradient(circle, rgba(168,184,200,0.13) 0%, transparent 60%);
  }
  .wrap { position: relative; z-index: 2; padding: 80px 90px; height: 100%; display: flex; flex-direction: column; justify-content: space-between; }
  .brand { display: flex; align-items: center; gap: 14px; }
  .brand-name { font-size: 30px; font-weight: 700; letter-spacing: 5px; text-transform: uppercase; }
  .brand-name .wax { color: #a8b8c8; }
  h1 {
    font-size: 84px; font-weight: 700; line-height: 1.04;
    text-transform: uppercase; letter-spacing: 2px;
    max-width: 760px;
  }
  h1 .accent { color: #a8b8c8; }
  .sub {
    font-family: 'Inter', 'Helvetica Neue', sans-serif;
    font-size: 26px; font-weight: 400; color: #9a9a9a;
    max-width: 680px; line-height: 1.45; margin-top: 26px;
  }
  .stats { display: flex; gap: 48px; }
  .stat strong { display: block; font-size: 40px; font-weight: 600; color: #a8b8c8; letter-spacing: 1px; }
  .stat span {
    font-family: 'Inter', 'Helvetica Neue', sans-serif;
    font-size: 15px; font-weight: 500; text-transform: uppercase; letter-spacing: 2px; color: #777;
  }
  /* vinyl record */
  .vinyl {
    position: absolute; right: -130px; top: 50%; transform: translateY(-50%);
    width: 560px; height: 560px; border-radius: 50%;
    background: repeating-radial-gradient(circle at center, #0a0a0a 0px, #1a1a1a 2px, #0a0a0a 4px);
    box-shadow: 0 0 0 2px rgba(168,184,200,0.25), 0 30px 120px rgba(0,0,0,0.8);
  }
  .vinyl::after {
    content: ''; position: absolute; inset: 0; border-radius: 50%;
    background: conic-gradient(from 150deg, transparent 0deg, rgba(255,255,255,0.08) 22deg, transparent 55deg, transparent 180deg, rgba(255,255,255,0.06) 205deg, transparent 240deg);
  }
  .vinyl-label {
    position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%);
    width: 170px; height: 170px; border-radius: 50%;
    background: #c8a44a;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 0 4px #0e0e0e;
  }
  .vinyl-label-inner {
    text-align: center; color: #161616; font-weight: 700;
    font-size: 22px; letter-spacing: 2px; text-transform: uppercase; line-height: 2.1;
  }
  .vinyl-hole { position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%); width: 14px; height: 14px; border-radius: 50%; background: #080808; }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="vinyl">
    <div class="vinyl-label"><div class="vinyl-label-inner">Wax<br>Digger</div></div>
    <div class="vinyl-hole"></div>
  </div>
  <div class="wrap">
    <div class="brand">
      <div class="brand-name"><span class="wax">WAX</span> DIGGER</div>
    </div>
    <div>
      <h1>Your wantlist,<br><span class="accent">in stock.</span></h1>
      <div class="sub">Every record on your Discogs wantlist, checked against 12 stores daily — with the cheapest cart built for you.</div>
    </div>
    <div class="stats">
      <div class="stat"><strong>12</strong><span>Stores</span></div>
      <div class="stat"><strong>17,000+</strong><span>Records tracked</span></div>
      <div class="stat"><strong>Daily</strong><span>Restock checks</span></div>
    </div>
  </div>
</body>
</html>
