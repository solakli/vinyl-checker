<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gold Digger</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 300px;
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #1a1a1a;
    color: #fff;
    padding: 0;
  }

  .header {
    background: #111;
    padding: 14px 16px 12px;
    border-bottom: 1px solid #333;
  }
  .header h1 {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .header h1 span { color: #C9A227; }
  .header p {
    font-size: 11px;
    color: #888;
    margin-top: 2px;
  }

  .section {
    padding: 14px 16px;
    border-bottom: 1px solid #2a2a2a;
  }

  label {
    display: block;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 5px;
  }

  input[type="text"] {
    width: 100%;
    background: #2a2a2a;
    border: 1px solid #444;
    border-radius: 5px;
    color: #fff;
    font-size: 12px;
    padding: 7px 9px;
    outline: none;
  }
  input[type="text"]:focus { border-color: #C9A227; }
  input[type="text"]::placeholder { color: #555; }

  .sync-btn {
    width: 100%;
    background: #C9A227;
    color: #1a1a1a;
    border: none;
    border-radius: 5px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    padding: 10px;
    cursor: pointer;
    margin-top: 12px;
    transition: filter 0.15s;
  }
  .sync-btn:hover { filter: brightness(1.1); }
  .sync-btn:disabled { background: #444; color: #777; cursor: default; }

  .progress-wrap {
    margin-top: 12px;
    display: none;
  }
  .progress-track {
    height: 4px;
    background: #333;
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: #C9A227;
    border-radius: 2px;
    width: 0%;
    transition: width 0.4s ease;
  }
  .progress-text {
    font-size: 10px;
    color: #888;
    margin-top: 5px;
    text-align: center;
  }

  .status {
    font-size: 11px;
    margin-top: 10px;
    padding: 7px 9px;
    border-radius: 5px;
    display: none;
  }
  .status.success { background: rgba(74,222,128,0.12); color: #4ade80; }
  .status.error   { background: rgba(255,80,80,0.12);  color: #ff6b6b; }
  .status.info    { background: rgba(201,162,39,0.12); color: #C9A227; }

  .open-btn {
    width: 100%;
    background: none;
    border: 1px solid #333;
    color: #888;
    border-radius: 5px;
    font-size: 11px;
    padding: 8px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  .open-btn:hover { border-color: #C9A227; color: #C9A227; }

  .last-synced {
    font-size: 10px;
    color: #555;
    margin-top: 6px;
    text-align: center;
  }
</style>
</head>
<body>

<div class="header">
  <h1><span>Gold</span> Digger</h1>
  <p>Discogs Marketplace Sync</p>
</div>

<div class="section">
  <label>Server URL</label>
  <input type="text" id="serverUrl" placeholder="https://stream.ronautradio.la/vinyl">
  <label style="margin-top:10px">Discogs Username</label>
  <input type="text" id="username" placeholder="your_username">

  <button class="sync-btn" id="syncBtn">Sync Marketplace Prices</button>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-text" id="progressText">Starting...</div>
  </div>

  <div class="status" id="status"></div>
  <div class="last-synced" id="lastSynced"></div>
</div>

<div class="section">
  <button class="open-btn" id="openApp">Open Gold Digger ↗</button>
</div>

<script src="popup.js"></script>
</body>
</html>
